<script type="application/lua" id="edgetx">
	model = {
		getModule = function (modIdx)
			local module = {}
			module.Type = 5
			return module
		end;
	}
	lcd = {
		clear = function (color)
			print("LCD:CLEAR")
		end;
		drawLine = function (x1, y1, x2, y2, pattern, flags)
			print("LCD:DRAWLINE")
		end;
		drawGauge = function (x, y, w, h, fill, maxfill, flags)
			if maxfill ~= nil and maxfill ~= 0 and fill ~= nil then
				print(string.format("GAUGE %.2f %%", (fill/maxfill)*100.0))
			end
		end;
		drawRectangle = function (x, y, w, h, flags, t)
			print("LCD:DRAWRECT")
		end;
		drawFilledRectangle = function (x, y, w, h, flags)
			print("LCD:DRAWFRECT")
		end;
		drawText = function (x, y, text, flags, inversColor)
			print("LCD: " .. text)
		end;
		setColor = function (colorIndex, color)
			print("LCD:SETCOLOR")
		end;
		getLastPos = function ()
			return 1
		end
	}

	bit32 = {
		band = function (a,b)
			return(a&b)
		end;
		bor = function (a,b)
			return(a|b)
		end;
		lshift = function (a,b)
			return(a<<b)
		end;
		rshift = function (a,b)
			return(a>>b)
		end;
		btest = function (a,b)
			return(a&b~=0)
		end;
	}

	CRSF_IN = {}
	CRSF_OUT = {}
	ELRS_LOAD = {}

	function getVersion ()
		return "2.9.4", "pclua4elrs", 2, 9, 4, "EdgeTX"
	end

	function popupConfirmation (t, m, e)
		print(string.format("[%q] %s: %s", t, m, e))
		return "CANCEL"
	end

	function crossfireTelemetryPush (cmd, data)
		if cmd == nil or data == nil then
			-- frame being collected for CRSF transmission
			success, cmd, data = pcall(function () return table.unpack(table.remove(CRSF_OUT)) end)
			if success == false then
				return nil
			end
			return cmd, data
		else
			-- frame being pushed for later transmission
			table.insert(CRSF_OUT, 1, {cmd, data})
			return true
		end
	end

	function crossfireTelemetryPop (cmd, data)
		if cmd ~= nil and data ~= nil then
			-- frame arrived from the CRSF link
			table.insert(CRSF_IN, 1, {cmd, data})
			return true
		else
			-- frame being collected for processing
			success, cmd, data = pcall(function () return table.unpack(table.remove(CRSF_IN)) end)
			if success == false then
				return nil
			end
			return cmd, data
		end
	end
	
	function crossfireTelemetryFlush ()
		CRSF_IN = {}
		CRSF_OUT = {}
	end
	
	function multiret (fname, ...)
		local f = _G[fname]
		if f == nil then return nil end
		return table.pack(f(...))
	end
	
	function loadelrs (filename)
		ELRS_LOAD = loadfile(filename or 'elrsV3.lua')
		return ELRS_LOAD
	end
	
	LCD_W = 480
	LCD_H = 272
	CHAR_UP = '+'
	CHAR_DOWN = '-'
	EVT_VIRTUAL_ENTER = 1
	EVT_VIRTUAL_EXIT = 2
	EVT_VIRTUAL_NEXT = 4
	EVT_VIRTUAL_PREV = 8
	CENTER = 16
	RIGHT = 32
	BOLD = 64
	SOLID = 128
	INVERS = 256
	BLINK = 512
	CUSTOM_COLOR = 1024
	BLACK = 2048
	WHITE = 4096
	GREY_DEFAULT = 8192
</script>
<script>
lcd = {
	'strokeStyle': function (flags) {
		if ((flags & lcd.INVERS) == lcd.INVERS) {
			lcd.ctx.strokeStyle = '#ffffff';
		} else if ((flags & lcd.CUSTOM_COLOR) == lcd.CUSTOM_COLOR) {
			lcd.ctx.strokeStyle = lcd.COLOR_CUSTOM;
		} else {
			lcd.ctx.strokeStyle = '#000000';
		}
		if (lcd.debug) console.log(`strokeStyle ${lcd.ctx.strokeStyle}`);
	},
	'fillStyle': function (flags) {
		if ((flags & lcd.INVERS) == lcd.INVERS) {
			lcd.ctx.fillStyle = '#ffffff';
		} else if ((flags & lcd.CUSTOM_COLOR) == lcd.CUSTOM_COLOR) {
			lcd.ctx.fillStyle = lcd.COLOR_CUSTOM;
		} else {
			lcd.ctx.fillStyle = '#000000';
		}
		if (lcd.debug) console.log(`fillStyle ${lcd.ctx.fillStyle}`);
	},
	'textConfig': function (flags) {
		var fontflags = []
		if ((flags & lcd.RIGHT) == lcd.RIGHT) {
			lcd.ctx.textAlign = 'right';
		} else {
			lcd.ctx.textAlign = 'left';
		}
		if ((flags & lcd.BLINK) == lcd.BLINK) {
			fontflags.push('italic');
		}
		if ((flags & lcd.BOLD) == lcd.BOLD) {
			fontflags.push('bold');
		}
		fontflags.push(lcd.font);
		lcd.ctx.font = fontflags.join(' ');
		if (lcd.debug) console.log(`textAlign ${lcd.ctx.textAlign} font ${lcd.ctx.font}`);
	},
	'clear': function (color) {
		llog('LCD:CLEAR', 0);
		if (lcd.debug) console.log('clear');
		lcd.ctx.reset();
		lcd.lastpos = 0;
		lcd.ctx.font = lcd.font;
		lcd.ctx.textBaseline = 'top';
		lcd.ctx.lineWidth = 2;
	},
	'drawLine': function (x1, y1, x2, y2, pattern, flags) {
		if (lcd.debug) console.log(`drawLine ${flags}`);
		lcd.ctx.beginPath();
		lcd.ctx.moveTo(x1, y1);
		lcd.ctx.lineTo(x2, y2);
		lcd.ctx.closePath();
		lcd.strokeStyle(flags);
		lcd.ctx.stroke();
		lcd.lastpos = x2;
	},
	'drawGauge': function (x, y, w, h, fill, maxfill, flags) {
		const fillwidth = Math.floor((fill/maxfill)*w);
		lcd.ctx.clearRect(x, y, w, h);
		lcd.fillStyle(flags);
		lcd.ctx.fillRect(x, y, fillwidth, h);
		lcd.lastpos = x + w;
	},
	'drawRectangle': function (x, y, w, h, flags, t) {
		llog(`LCD:DRAWRECT ${x},${y},${w},${h}`, 0);
		lcd.strokeStyle(flags);
		lcd.ctx.strokeRect(x, y, w, h);
		lcd.lastpos = x + w;
		if (lcd.debug) console.log(`drawRectangle ${flags}`);
	},
	'drawFilledRectangle': function (x, y, w, h, flags) {
		llog(`LCD:DRAWFRECT ${x},${y},${w},${h}`, 0);
		lcd.fillStyle(flags);
		lcd.ctx.fillRect(x, y, w, h);
		lcd.lastpos = x + w;
		if (lcd.debug) console.log(`drawFilledRectangle ${flags}`);
	},
	'drawText': function (x, y, text, flags, inversColor) {
		llog(`LCD:DRAWTEXT ${text}`, 0);
		if (lcd.debug) console.log(`drawText ${flags} ${text}`);
		lcd.textConfig(flags);
		const tmetrics = lcd.ctx.measureText(text);
		const boundw = Math.round(tmetrics.actualBoundingBoxLeft + tmetrics.actualBoundingBoxRight);
		const boundh = Math.round(tmetrics.actualBoundingBoxAscent + tmetrics.actualBoundingBoxDescent);
		if ((flags & lcd.INVERS) == lcd.INVERS) {
			lcd.fillStyle(0);
			lcd.ctx.fillRect(x-1, y, boundw+4, 22);
		}
		lcd.fillStyle(flags);
		lcd.ctx.fillText(text, x, y);
		lcd.lastpos = x + boundw;
	},
	'RGB': function (r, g, b) {
		if (r === undefined) return;
		if (g === undefined) return;
		return `rgb(${r},${g},${b})`;
	},
	'setColor': function (colorIndex, color) {
		if (colorIndex != lcd.CUSTOM_COLOR) return;
		switch (color) {
		case lcd.BLACK:
			color = 'black';
			break;
		case lcd.WHITE:
			color = 'white';
			break;
		}
		lcd.COLOR_CUSTOM = color;
		if (lcd.debug) console.log(`COLOR_CUSTOM: ${color}`);
	},
	'sizeText': function (text, flags) {
		lcd.textConfig(flags);
		const tmetrics = lcd.ctx.measureText(text);
		const boundw = Math.round(tmetrics.actualBoundingBoxLeft + tmetrics.actualBoundingBoxRight);
		const boundh = Math.round(tmetrics.actualBoundingBoxAscent + tmetrics.actualBoundingBoxDescent);
		return [boundw, boundh || 22];
	},
	'getLastPos': function () {
		return lcd.lastpos;
	},
	'lastpos': 0,
	'ctx': null,
	'font': '16px "Noto Sans", Roboto, sans-serif',
	'COLOR_CUSTOM': '#000000',
	'debug': false
}

function get_uptime () {
	return Math.round(window.performance.now() / 10);
}

function try_tag (tag) {
	const contentTypeRegexp = /^(.*?\/.*?)([\t ]*;.*)?$/;
	if (tag.tagName !== "SCRIPT")
		return;
	let contentTypeMatch = contentTypeRegexp.exec(tag.type);
	if (!contentTypeMatch)
		return;
	let mimetype = contentTypeMatch[1];
	if (mimetype !== "application/lua" && mimetype !== "text/lua")
		return;
	if (tag.src)
		return;
	window.lua.doStringSync(tag.innerHTML);
};

function llog (msg, level = 1) {
	const currentLevel = parseInt(document.getElementById('log-level')?.value || 1);
	if (level < currentLevel) return;
	console.log(`[${level}] ${msg}`);
}

function portstr (info) {
	let str = '';
	if (info.usbVendorId) {
		str += info.usbVendorId;
	} else {
		str += '0';
	}
	str += ':';
	if (info.usbProductId) {
		str += info.usbProductId;
	} else {
		str += '0';
	}
	return str;
}

function loadpairedports (verbose=true) {
	if (navigator.serial === undefined) {
		llog('Browser does not support Web Serial API (e.g. Safari). Please use a Chrome-based browser.', 3);
		pairbutton.disabled = true;
		return;
	}
	navigator.serial.getPorts().then((ports) => {
		let info;
		let npairedport = null;
		for (port of ports) {
			info = port.getInfo();
			if (pairedport != null && pairedport.port == port) return;
			const str = portstr(info);
			npairedport = {
				port: port,
				info: str
			};
			if (verbose) llog(`device ${str} found`, 1);
			break;
		}
		pairedport = npairedport;
		if (pairedport != null) {
			pairbutton.innerHTML = 'unpair ' + pairedport.info;
			baudselect.disabled = false;
			connbutton.disabled = false;
			connbutton.innerHTML = 'connect';
		} else {
			pairbutton.innerHTML = 'pair device';
			baudselect.disabled = true;
			connbutton.disabled = true;
			connbutton.innerHTML = 'connect';
		}
	}).catch((e) => {
		llog(`Error listing ports: ${e.message}`, 3);
	});
}

function edgetx_popupConfirmation (title, message, event) {
	const ret = popup_status.return;
	popup_status.title = title;
	popup_status.message = message;
	popup_status.visible = true;
	if (ret != null) {
		popup_status.return = null;
		return ret;
	}
}

function elrsrun (key = 0) {
	if (elrs == null || typeof elrs.run !== 'function') return;
	popup_status.visible = false;
	try {
		if (elrs.run(key) != 0) {
			llog('ELRS Lua exited!', 1);
			crossfireFlush();
			elrsrefresh(true);
			elrs = null;
			return;
		}
	} catch (e) {
		showLuaError(e.message);
		return;
	}
	ret = multiret('crossfireTelemetryPush');
	if (ret[1] !== undefined) {
		comworker.postMessage(['crsfsend', ret[1], ret[2]]);
	}
	if (popup_status.visible) {
		llog(`popup ${popup_status.title}: ${popup_status.message}`, 1);
	}
}

function showLuaError(msg) {
	llog('LUA ERROR: ' + msg, 3);
	elrsrefresh(true);
	elrs = null;
	
	// Draw error on LCD
	lcd.clear();
	lcd.ctx.fillStyle = '#ff0000';
	lcd.ctx.font = 'bold 24px monospace';
	lcd.ctx.fillText('LUA ERROR', 10, 40);
	lcd.ctx.fillStyle = '#ffffff';
	lcd.ctx.font = '14px monospace';
	
	// Simple text wrapping for the error message
	const words = msg.split(' ');
	let line = '';
	let y = 70;
	for (let n = 0; n < words.length; n++) {
		let testLine = line + words[n] + ' ';
		if (testLine.length > 50) {
			lcd.ctx.fillText(line, 10, y);
			line = words[n] + ' ';
			y += 20;
		} else {
			line = testLine;
		}
	}
	lcd.ctx.fillText(line, 10, y);
}

function elrsrefresh (clear=false) {
	if (elrsinterval == null) {
		if (clear) return;
		elrsinterval = setInterval(elrsrefresh, 100);
	} else if (clear) {
		clearInterval(elrsinterval);
		elrsinterval = null;
		return;
	}
	elrsrun();
}

async function boot () {
	const lua = await wasmoon.factory.createEngine();
	window.lua = lua;
	lua.global.set('getTime', get_uptime);
	
	// Map Lua print to our llog with level support. 
	// Lua draw calls often use print, so they default to DEBUG (0).
	lua.global.set('print', (msg) => llog(msg, 0));

	const selector = 'script[type^="application/lua"], script[type^="text/lua"]';
	Array.prototype.forEach.call(document.querySelectorAll(selector), try_tag);
	if (elrs_load === true) {
		console.debug('elrs_load=1 boot');
		elrs_load = await window.lua.doString('return loadelrs()');
	} else {
		elrs_load = true;
	}
	crossfirePop = lua.global.get('crossfireTelemetryPop');
	crossfireFlush = lua.global.get('crossfireTelemetryFlush');
	multiret = lua.global.get('multiret');
	const logelem = document.getElementById("log");
	if (logelem) {
		llog = function (msg, level = 1) {
			const currentLevel = parseInt(document.getElementById('log-level').value);
			if (level < currentLevel) return;
			const tm = get_uptime();
			logelem.append(`${tm} ${msg}\n`);
			// Auto scroll to bottom
			if (logelem.parentElement) {
				logelem.parentElement.scrollTop = logelem.parentElement.scrollHeight;
			}
		}
	}
	loadpairedports();
	lcd.ctx = document.getElementById('lcd').getContext('2d');
	lcd.clear();
	lcd.INVERS = lua.global.get('INVERS');
	lcd.RIGHT = lua.global.get('RIGHT');
	lcd.CENTER = lua.global.get('CENTER');
	lcd.BOLD = lua.global.get('BOLD');
	lcd.BLINK = lua.global.get('BLINK');
	lcd.SOLID = lua.global.get('SOLID');
	lcd.BLACK = lua.global.get('BLACK');
	lcd.WHITE = lua.global.get('WHITE');
	lcd.CUSTOM_COLOR = lua.global.get('CUSTOM_COLOR');
	
	// Map JS functions to the Lua 'lcd' table individually.
	// This preserves the Lua table structure and allows native Lua wrappers.
	lua.global.set('jsLcd', lcd);
	await window.lua.doString(`
		lcd = lcd or {}
		lcd.clear = function(...) return jsLcd.clear(...) end
		lcd.drawLine = function(...) return jsLcd.drawLine(...) end
		lcd.drawGauge = function(...) return jsLcd.drawGauge(...) end
		lcd.drawRectangle = function(...) return jsLcd.drawRectangle(...) end
		lcd.drawFilledRectangle = function(...) return jsLcd.drawFilledRectangle(...) end
		lcd.drawText = function(...) return jsLcd.drawText(...) end
		lcd.setColor = function(...) return jsLcd.setColor(...) end
		lcd.RGB = function(...) return jsLcd.RGB(...) end
		lcd.getLastPos = function(...) return jsLcd.getLastPos(...) end
		
		-- Native Lua wrapper for sizeText to correctly return multiple values.
		-- Wasmoon proxies JS arrays as objects where indices start at 0.
		lcd.sizeText = function(...)
			local res = jsLcd.sizeText(...)
			if res then
				local w = tonumber(res[0]) or tonumber(res[1]) or 0
				local h = tonumber(res[1]) or tonumber(res[2]) or 22
				return w, h
			end
			return 0, 22
		end
	`);

	lua.global.set('popupConfirmation', edgetx_popupConfirmation);
	let key = lua.global.get('EVT_VIRTUAL_ENTER');
	keymap[13] = key; // Enter
	keymap[39] = key; // Right
	keymap[76] = key; // l
	key = lua.global.get('EVT_VIRTUAL_EXIT');
	keymap[8] = key; // Backspace
	keymap[27] = key; // Escape
	keymap[37] = key; // Left
	keymap[72] = key; // h
	key = lua.global.get('EVT_VIRTUAL_PREV');
	keymap[38] = key; // Up
	keymap[74] = key; // j
	key = lua.global.get('EVT_VIRTUAL_NEXT');
	keymap[40] = key; // Down
	keymap[75] = key; // k
}

elrs_load = null;
elrs = null;
crossfirePop = null;
crossfireFlush = null;
multiret = null;
pairedport = null;
statusinterval = null;
elrsinterval = null;
comworker = new Worker('worker.js');
baudselect = document.getElementById('baud');
connbutton = document.getElementById('connect');
pairbutton = document.getElementById('pair');
startbutton = document.getElementById('start');
statusspan = document.getElementById('crsfstatus');
uploadbtn = document.getElementById('upload-btn');
fileupload = document.getElementById('lua-upload');
filename_display = document.getElementById('lua-filename');
download_link = document.getElementById('download-link');

uploadbtn.addEventListener('click', () => fileupload.click());
fileupload.addEventListener('change', async (ev) => {
	const file = ev.target.files[0];
	if (!file) return;
	
	llog(`Loading ${file.name}...`, 1);
	const text = await file.text();
	
	// Show last 5 lines to verify content
	const lines = text.trim().split('\n');
	const lastLines = lines.slice(-5);
	llog('--- Last 5 lines ---', 1);
	lastLines.forEach(l => llog('> ' + l, 1));
	llog('-------------------', 1);

	const uint8 = new TextEncoder().encode(text);
	
	// Use a unique filename in the virtual FS to force a fresh load
	const vFilename = `upload_${Date.now()}.lua`;
	await wasmoon.factory.mountFile(vFilename, uint8);
	
	filename_display.innerText = file.name;
	
	const blob = new Blob([text], { type: 'text/x-lua' });
	const url = URL.createObjectURL(blob);
	download_link.href = url;
	download_link.download = file.name;

	// Reset state and clear canvas
	if (elrs != null) {
		elrsrefresh(true);
		elrs = null;
	}
	crossfireFlush();
	lcd.clear(); // Clear the LCD so we don't see old frames

	try {
		// Pass the unique filename to the loader
		const elrs_loader_factory = await window.lua.doString(`return loadelrs("${vFilename}")`);
		if (typeof elrs_loader_factory !== 'function') {
			throw new Error('Script did not return a valid loader function');
		}
		
		elrs = elrs_loader_factory();
		if (!elrs) {
			throw new Error('Script returned nil');
		}
		
		// Detailed check of required functions
		const hasInit = typeof elrs.init === 'function';
		const hasRun = typeof elrs.run === 'function';
		
		if (!hasInit || !hasRun) {
			let missing = [];
			if (!hasInit) missing.push('init()');
			if (!hasRun) missing.push('run()');
			throw new Error(`Script is missing ${missing.join(' and ')} function(s)`);
		}

		llog(`Initializing ${file.name}...`, 1);
		elrs.init();
		elrsrefresh();
		llog(`${file.name} started successfully`, 1);
	} catch (e) {
		showLuaError(e.message);
		console.error('Lua Load Error:', e);
	}
});
popup_status = {
	'title': null,
	'message': null,
	'return': null,
	'visible': false
};
keymap = {}

const crsfstatus = {
	hz: 0,
	shifts: [],
	reset: function () {
		this.hz = 0;
		this.shifts = [];
	}
}

const status = {
	interval: null,
	_update: null,
	bootiters: 0,
	update: function () {
		return this._update();
	},
	update_main: function () {
		var sstr = '';
		if (connbutton.innerHTML != 'connect') {
			if (crsfstatus.shifts.length > 0) {
				const sum = crsfstatus.shifts.reduce((partialSum, a) => partialSum + a, 0);
				const avg = (sum / crsfstatus.shifts.length).toFixed(1);
				const smin = Math.min(...crsfstatus.shifts);
				const smax = Math.max(...crsfstatus.shifts);
				sstr = `hz:${crsfstatus.hz} shift:[${avg} ${smin} ${smax}]`;
				crsfstatus.shifts = [];
			} else {
				sstr = `hz:${crsfstatus.hz}`;
			}
		}
		statusspan.innerHTML = sstr;
	},
	update_boot: function () {
		if (crsfstatus.shifts.length > 0) {
			this._update = this.update_main;
		} else {
			this.bootiters++;
			if (this.bootiters > 3) {
				llog('Unresponsive CRSF, disconnecting...', 2);
				comworker.postMessage(["stop"]);
			} else if (this.bootiters > 1) {
				llog('No CRSF response in >5 seconds', 2);
			}
		}
		return this.update_main();
	},
	reset: function () {
		if (this.interval != null) {
			clearInterval(this.interval);
			this.interval = null;
		}
		crsfstatus.reset();
		this._update = this.update_boot;
		this.bootiters = 0;
	},
	start: function () {
		if (this.interval == null) {
			this.interval = setInterval(this.update.bind(this), 5000);
		}
	}
}
status.reset();

const workermsg = {
	'started': function (data) {
		llog("serial worker started", 1);
		connbutton.innerHTML = 'disconnect';
		baudselect.disabled = true;
		document.getElementById('lua-version').innerText = 'connecting...';
		status.start();
	},
	'stopped': function (data) {
		llog("serial worker stopped", 1);
		connbutton.innerHTML = 'connect';
		startbutton.disabled = true;
		baudselect.disabled = false;
		document.getElementById('lua-version').innerText = '-- (no connection)';
		crossfireFlush();
		status.reset();
		elrsrefresh(true);
		elrs = null;
	},
	'writeburn': function (data) {
		comworker.postMessage(data);
	},
	'log': function (data) {
		llog(data[1], data[2]);
	},
	'sync': function (data) {
		var quickupd = false;
		if (data[1] != crsfstatus.hz) {
			crsfstatus.hz = data[1];
			quickupd = true;
		}
		if (data.length > 2) crsfstatus.shifts.push(data[2]);
		if (quickupd) status.update();
	},
	'start': function (data) {
		llog('starting ELRS', 1);
		elrs = elrs_load();
		elrs.init();
		elrsrefresh();
		startbutton.disabled = false;
	},
	'crsfrecv': function (data) {
		var cmd = data[1];
		var d = data[2];
		crossfirePop(cmd, d);
	},
	'devinfo': function (data) {
		const name = data[1];
		const ver = `${data[2]}.${data[3]}.${data[4]}`;
		document.getElementById('lua-version').innerText = `${name} (v${ver})`;
	}
};

window.addEventListener("load", boot);
comworker.addEventListener("message", (e) => { return workermsg[e.data[0]](e.data); });
document.addEventListener('keydown', (ev) => {
	let key = keymap[ev.which];
	if (key === undefined) return true;
	ev.preventDefault();
	if (elrs == null) return false;
	if (ev.which == 13) { // ENTER
		popup_status.return = "OK";
	} else if (ev.which == 27) { // ESCAPE
		popup_status.return = "CANCEL";
	}
	elrsrun(key);
	return false;
});
document.querySelector('script[src="elrsV3.lua"]').addEventListener(
	'load',
	(ev) => {
		if (elrs_load === true) {
			console.debug('elrs_load=1 notboot');
			elrs_load = window.lua.doStringSync('return loadelrs()');
		} else {
			elrs_load = true;
		}
	}
);

navigator.serial?.addEventListener("connect", (e) => {
	const info = e.target.getInfo();
	const str = portstr(info);
	llog(`paired device ${str} attached`, 1);
	loadpairedports(false);
});
navigator.serial?.addEventListener("disconnect", (e) => {
	const info = e.target.getInfo();
	const str = portstr(info);
	llog(`paired device ${str} detached`, 1);
	loadpairedports(false);
});

pairbutton.addEventListener("click", () => {
	if (navigator.serial === undefined) {
		llog('Browser does not support Web Serial API. Pairing unavailable.', 3);
		return;
	}
	if (pairedport != null) {
		pairedport.port.forget().then(() => {
			llog(`device ${pairedport.info} unpaired`, 1);
			loadpairedports();
		}).catch((e) => {
			llog(`Error unpairing: ${e.message}`, 3);
		});
	} else {
		llog('Requesting device pair...', 1);
		navigator.serial.requestPort().then((port) => {
			const info = port.getInfo();
			const str = portstr(info);
			llog(`device ${str} paired`, 1);
			loadpairedports(false);
		}).catch((e) => {
			if (e.name == 'NotFoundError') {
				llog('Pairing cancelled by user', 1);
				return;
			}
			llog(`Error pairing: ${e.message}`, 3);
			throw(e);
		});
	}
});

connbutton.addEventListener("click", () => {
	if (pairedport == null) return;
	if (connbutton.innerHTML == 'connect') {
		comworker.postMessage(["start", baudselect.value]);
		connbutton.innerHTML = 'connecting...';
	} else {
		comworker.postMessage(["stop"]);
	}
});

startbutton.addEventListener('click', () => {
	llog('(re)starting ELRS', 1);
	if (elrs != null) {
		crossfireFlush();
		elrsrefresh(true);
		elrs = null;
	}
	elrs = elrs_load();
	elrs.init();
	elrsrefresh();
});
</script>
</html>
